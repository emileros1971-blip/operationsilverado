name: Apply homepage cross-links

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/temporary-homepage-crosslinks.yml

permissions:
  contents: write

jobs:
  patch-homepage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch homepage safely
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old = '  <meta name="theme-color" content="#f7f2ea" />'
          new = old + '\n  <link rel="canonical" href="https://silverado.pro/" />'
          if text.count(old) != 1:
              raise SystemExit('Canonical insertion point changed')
          text = text.replace(old, new, 1)

          schema = {
              '@context': 'https://schema.org',
              '@graph': [
                  {
                      '@type': 'Organization',
                      '@id': 'https://silverado.pro/#organization',
                      'name': 'Silverado Video Emil Eres PR',
                      'alternateName': 'Silverado.pro',
                      'url': 'https://silverado.pro/',
                      'telephone': '+381691508197',
                      'email': 'emileros1971@gmail.com',
                      'address': {
                          '@type': 'PostalAddress',
                          'addressLocality': 'Palić / Subotica',
                          'postalCode': '24413',
                          'addressCountry': 'RS'
                      },
                      'brand': {
                          '@type': 'Brand',
                          'name': 'websajtizrada.online',
                          'url': 'https://websajtizrada.online/'
                      }
                  },
                  {
                      '@type': 'WebSite',
                      '@id': 'https://silverado.pro/#website',
                      'url': 'https://silverado.pro/',
                      'name': 'Silverado.pro',
                      'publisher': {'@id': 'https://silverado.pro/#organization'},
                      'inLanguage': 'sr'
                  },
                  {
                      '@type': 'Service',
                      '@id': 'https://silverado.pro/izrada-sajtova.html#service',
                      'name': 'Profesionalna izrada web sajtova',
                      'url': 'https://silverado.pro/izrada-sajtova.html',
                      'provider': {'@id': 'https://silverado.pro/#organization'},
                      'areaServed': ['Subotica', 'Palić', 'Srbija'],
                      'isRelatedTo': {
                          '@type': 'WebSite',
                          'name': 'websajtizrada.online',
                          'url': 'https://websajtizrada.online/'
                      }
                  }
              ]
          }
          schema_tag = '  <script type="application/ld+json">' + json.dumps(schema, ensure_ascii=False, separators=(',', ':')) + '</script>\n'
          anchor = '  <link rel="preconnect" href="https://fonts.googleapis.com">'
          if text.count(anchor) != 1:
              raise SystemExit('Schema insertion point changed')
          text = text.replace(anchor, schema_tag + '\n' + anchor, 1)

          replacements = [
              ('    <li><a href="#sajtovi">Sajtovi</a></li>', '    <li><a href="izrada-sajtova.html">Izrada sajtova</a></li>'),
              ('    <p class="sec-body" style="margin-bottom:32px;">Od jednostavnog website-a, preko web shopa, do online porudžbine za ugostitelje — svaki sajt je urađen brzo, moderno i prilagođen mobilnim uređajima. <strong>Akcijske cene — sve uključeno.</strong></p>', '    <p class="sec-body" style="margin-bottom:32px;max-width:860px;">Od jednostavnog website-a, preko web shopa, do online porudžbine za ugostitelje — svaki sajt je urađen brzo, moderno i prilagođen mobilnim uređajima. <strong>Akcijske cene — sve uključeno.</strong> Za kompletnu ponudu, pakete i nove projekte posetite <a href="https://websajtizrada.online/" target="_blank" rel="noopener" style="color:var(--rust);font-weight:700;">WebsajtIzrada.online</a> ili pogledajte <a href="https://websajtizrada.online/izrada-sajtova-subotica.html" target="_blank" rel="noopener" style="color:var(--rust);font-weight:700;">izradu sajtova u Subotici</a>.</p>'),
              ('      <a href="#sajtovi" class="hp-pill">Website / Webshop — <strong>od 6000 dinara</strong></a>', '      <a href="izrada-sajtova.html" class="hp-pill">Website / Webshop — <strong>od 6000 dinara</strong></a>'),
              ('        <p class="svc-desc">Moderan website ili webshop spreman za biznis u 2026. Brz, čist, mobilan, sa jasnim pozivom na akciju.</p>\n        <p class="svc-price">Cena po dogovoru</p>', '        <p class="svc-desc">Moderan website ili webshop spreman za biznis u 2026. Brz, čist, mobilan, sa jasnim pozivom na akciju.</p>\n        <p class="svc-price">Cena po dogovoru</p>\n        <p class="svc-callnote"><a href="izrada-sajtova.html" style="color:inherit;text-decoration:underline;">Pogledajte detaljnu ponudu →</a></p>'),
              ('          <a href="#kontakt" class="btn-primary">Poruči</a>\n          <a href="tel:+381691508197" class="btn-outline">📞 Pozovi</a>\n        </div>\n      </div>\n      <div class="plan-card">\n        <span class="plan-badge">Oglasi</span>', '          <a href="izrada-sajtova.html" class="btn-primary">Detaljna ponuda</a>\n          <a href="tel:+381691508197" class="btn-outline">📞 Pozovi</a>\n        </div>\n      </div>\n      <div class="plan-card">\n        <span class="plan-badge">Oglasi</span>'),
              ('    <a href="#sajtovi">Sajtovi</a>\n    <a href="#usluge">Usluge</a>', '    <a href="izrada-sajtova.html">Izrada sajtova</a>\n    <a href="https://websajtizrada.online/" target="_blank" rel="noopener">WebsajtIzrada.online</a>\n    <a href="#usluge">Usluge</a>'),
              ('  <p class="f-copy">© <span id="year"></span> Silverado.pro · +381 69 150 8197</p>', '  <p class="f-copy">© <span id="year"></span> Silverado Video Emil Eres PR · +381 69 150 8197</p>')
          ]

          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit('Expected homepage insertion point changed: ' + old[:80])
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate required changes
        run: |
          grep -q 'rel="canonical" href="https://silverado.pro/"' index.html
          grep -q 'https://websajtizrada.online/' index.html
          grep -q 'izrada-sajtova.html' index.html
          grep -q 'Silverado Video Emil Eres PR' index.html

      - name: Commit homepage and remove temporary workflow
        run: |
          rm .github/workflows/temporary-homepage-crosslinks.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/temporary-homepage-crosslinks.yml
          git commit -m "Add website-development links and structured data to homepage"
          git push
